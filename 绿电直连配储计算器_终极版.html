                                <th>F:閸氬牐顓?br>閸戝搫濮?MW)</th>
                                <th>G:鐠愮喕宓?br>(MW)</th>
                                <th>H:閻╁牅缍?br>/缂傚搫褰?/th>
                                <th>I:閸欘垰鍋?/th>
                                <th>J:閺€鍓ф暩</th>
                            </tr>
                        </thead>
                        <tbody id="timingTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 24鐏忓繑妞傞崗绋跨€烽崙鍝勫閺佺増宓侀敍?400H妞嬪海鏁?2000H閸忓绱￠敍?        const windTypicalCurve = [400,420,450,440,410,380,330,250,180,120,100,110,130,150,160,150,170,200,260,320,360,380,390,400];
        const solarTypicalCurve = [0,0,0,0,0,0,0,8,40,153,356,529,644,688,672,600,490,344,152,47,11,0,0,0];
        
        let timingChart = null;
        
        function calculate() {
            const B1   = parseFloat(document.getElementById('B1').value)  || 0;
            const B22  = parseFloat(document.getElementById('B22').value) || 0;
            const B3   = parseFloat(document.getElementById('B3').value)  || 0;
            const B9   = parseFloat(document.getElementById('B9').value)  || 0;
            const B7   = parseFloat(document.getElementById('B7').value)  || 0;
            const B8   = parseFloat(document.getElementById('B8').value)  || 0;
            const B30  = parseFloat(document.getElementById('B30').value) || 0;
            const B5   = parseFloat(document.getElementById('B5').value) || 0;
            const B6   = parseFloat(document.getElementById('B6').value) || 0;
            const eff  = parseFloat(document.getElementById('eff').value) || 0.85;
            const B17  = parseFloat(document.getElementById('B17').value) || 65;
            
            const B2   = B1 * 8760;
            const B4   = B3 * B2;
            const B21  = B1;
            const B23  = B22 * B21 / 365;
            const B24  = B3;
            const B25  = B2 * (1 - B24) / 365;
            const B26  = B9;
            const B29  = B8;
            
            const timing = generateTimingData(B1, B8, B9);
            const D68 = timing.D68;
            const E68 = timing.E68;
            const C68 = timing.C68;
            const F68 = D68 + E68;
            const G68 = timing.G68;
            const I68 = timing.I68;
            const J68 = timing.J68;
            const B28 = E68;
            const B31 = B30 * B29 / 365;
            const B69 = E68 * 365;
            const C69 = I68 * 365;
            
            const B32 = I68;
            const B33 = -Math.min(...timing.I_array);
            const B34 = (J68 - B25) > 0 ? (J68 - B25) : 0;
            const B35 = B34 > 0 ? B34 / eff : 0;
            const B36 = B32 - B35;
            const B37 = (B28 + B31) > 0 ? (B36 / (B28 + B31) * 100) : 0;
            const B38 = B36 < 0 ? (B28 + B31) : (B28 + B31 - B36 - (B35 - B34));
            const B39 = G68 > 0 ? (B38 / G68 * 100) : 0;
            const B40 = B39 < (B3 * 100) ? "閺堫亝寮х搾鍏呯返閻㈠灚鐦笟瀣洣濮? : "濠娐ゅ喕鐟曚焦鐪?;
            const B41 = B35 - B34;
            const B42 = B28 > 0 ? (B41 / B28 * 100) : 0;
            const B10_calc = B35;
            const C17 = B17 * 0.85;
            
            const B12 = B9 * 1000000 * B5 / 10000;
            const B13 = B10_calc * B6 * 1000000 / 10000;
            const B14 = B13 + B12;
            const B15 = B4 > 0 ? (B14 / B4 * 10000 / 1000) : 0;
            
            document.getElementById('B2').textContent = B2.toFixed(0);
            document.getElementById('B4').textContent = B4.toFixed(0);
            document.getElementById('B23').textContent = B23.toFixed(0);
            document.getElementById('B25').textContent = B25.toFixed(0);
            document.getElementById('B28').textContent = B28.toFixed(0);
            document.getElementById('D68').textContent = D68.toFixed(0);
            document.getElementById('F68').textContent = F68.toFixed(0);
            document.getElementById('C68').textContent = C68.toFixed(0);
            document.getElementById('B69').textContent = B69.toFixed(0);
            document.getElementById('B31').textContent = B31.toFixed(0);
            document.getElementById('B10_calc').textContent = B10_calc.toFixed(0);
            document.getElementById('I68').textContent = I68.toFixed(0);
            document.getElementById('J68').textContent = J68.toFixed(0);
            document.getElementById('B32').textContent = B32.toFixed(0);
            document.getElementById('C69').textContent = C69.toFixed(0);
            document.getElementById('B33').textContent = B33.toFixed(1);
            document.getElementById('B34').textContent = B34.toFixed(0);
            document.getElementById('B35').textContent = B35.toFixed(0);
            document.getElementById('B36').textContent = B36.toFixed(0);
            document.getElementById('B37').textContent = B37.toFixed(2);
            document.getElementById('B38').textContent = B38.toFixed(0);
            document.getElementById('B39').textContent = B39.toFixed(2);
            document.getElementById('B40').textContent = B40;
            document.getElementById('B40').style.color = B39 < (B3 * 100) ? '#dc3545' : '#28a745';
            document.getElementById('B41').textContent = B41.toFixed(0);
            document.getElementById('B42').textContent = B42.toFixed(2);
            document.getElementById('C17').textContent = C17.toFixed(2);
            
            const invSec = document.getElementById('investmentSection');
            if (B5 > 0 || B6 > 0) {
                invSec.style.display = 'grid';
                document.getElementById('B12').textContent = B12.toFixed(0);
                document.getElementById('B13').textContent = B13.toFixed(0);
                document.getElementById('B14').textContent = B14.toFixed(0);
                document.getElementById('B15').textContent = B15.toFixed(4);
            } else {
                invSec.style.display = 'none';
            }
        }
        
        function generateTimingData(loadPower, windPower, solarPower) {
            const tableBody = document.getElementById('timingTableBody');
            tableBody.innerHTML = '';
            const D_arr = [], E_arr = [];
            let B68=0, C68=0, D68=0, E68=0, F68=0, G68=0, H68_neg=0, I68=0, J68=0;
            const I_array = [];
            for (let h=0; h<24; h++) {
                const B = windTypicalCurve[h];
                const C = solarTypicalCurve[h];
                const D = windPower * B / 1000;
                const E = solarPower * C / 1000;
                D_arr.push(D);
                E_arr.push(E);
                const F = D + E;
                const G = loadPower;
                const H = F - G;
                const I = H > 0 ? H : 0;
                const J = H < 0 ? -H : 0;
                B68+=B; C68+=C; D68+=D; E68+=E; F68+=F; G68+=G;
                I68+=I; J68+=J;
                if (H<0) H68_neg+=H;
                I_array.push(I);
                const row = document.createElement('tr');
                row.innerHTML = '<td>'+h.toString().padStart(2,'0')+':00</td><td>'+B+'</td><td>'+C+'</td><td>'+D.toFixed(1)+'</td><td>'+E.toFixed(1)+'</td><td>'+F.toFixed(1)+'</td><td>'+G.toFixed(1)+'</td><td class="'+(H>=0?'positive':'negative')+'">'+(H>=0?'+':'')+H.toFixed(1)+'</td><td class="positive">'+I.toFixed(1)+'</td><td class="negative">'+J.toFixed(1)+'</td>';
                tableBody.appendChild(row);
            }
            drawTimingChart(D_arr, E_arr, loadPower);
            return { B68, C68, D68, E68, F68, G68, I68, J68, I_array };
        }
        
        function drawTimingChart(D_arr, E_arr, loadPower) {
            const labels = Array.from({length:24},(_,i)=>i.toString().padStart(2,'0')+':00');
            const windData = D_arr;
            const solarData = E_arr;
            const totalData = windData.map((w,i)=>w+solarData[i]);
            const loadData = labels.map(()=>loadPower);
            const ctx = document.getElementById('timingChart').getContext('2d');
            if (timingChart) timingChart.destroy();
            timingChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label:'妞嬪海鏁搁崙鍝勫', data:windData, borderColor:'rgba(0,123,255,1)', backgroundColor:'rgba(0,123,255,0.1)', borderWidth:2, fill:true },
                        { label:'閸忓绱￠崙鍝勫', data:solarData, borderColor:'rgba(255,193,7,1)', backgroundColor:'rgba(255,193,7,0.1)', borderWidth:2, fill:true },
                        { label:'閸氬牐顓搁崙鍝勫', data:totalData, borderColor:'rgba(40,167,69,1)', backgroundColor:'rgba(40,167,69,0.1)', borderWidth:3, fill:false },
                        { label:'鐠愮喕宓?, data:loadData, borderColor:'rgba(220,53,69,1)', borderWidth:2, borderDash:[5,5], fill:false }
                    ]
                },
                options: {
                    responsive:true, maintainAspectRatio:false,
                    plugins:{ title:{display:true,text:'24鐏忓繑妞傞弬鎷屽厴濠ф劕鍤崝娑楃瑢鐠愮喕宓庨崠褰掑帳',font:{size:16}}, legend:{position:'top'} },
                    scales:{ y:{beginAtZero:true,title:{display:true,text:'閸旂喓宸?(MW)'}}, x:{title:{display:true,text:'閺冨爼妫?}} }
                }
            });
        }
        
        function resetForm() {
            const fields = {B1:120, B22:8760, B3:0.6, B9:0, B7:2000, B8:450, B30:2400, B5:0, B6:0, eff:0.85, B17:65};
            Object.entries(fields).forEach(([k,v])=>document.getElementById(k).value=v);
            calculate();
        }
        
        window.onload = calculate;
    </script>
</body>
</html>
